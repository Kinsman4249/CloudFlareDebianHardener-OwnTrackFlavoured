# cf-owntracks: optional default_server on :80 that catches every request
# without a specific server_name match and 301s to https.
# Only installed when --global-http-redirect was passed and no other
# default_server on :80 exists.
server {
    listen      80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}
